        // task -------> when an image is clicked the image disappears
        document.querySelector('ul').addEventListener('click', function(e){
            // console.log(e.target); // give img tag
            // console.log(e.target.parentNode);  // gives li tag
            console.log(e.target.tagName); // give tag name only, 'IMG' in this case
            
            if(e.target.tagName === 'IMG'){         
                let removeEl = e.target.parentNode
                removeEl.remove()
            } // this will remove the image only if it is clicked not when a "list is clicked"
            
        })
